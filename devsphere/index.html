<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DevSphere</title>
  <style>
    :root{--bg:#0d1117;--panel:#161b22;--panel2:#0d1117;--line:#30363d;--text:#f0f6fc;--muted:#8b949e;--blue:#2f81f7;--green:#238636;--red:#da3633;--yellow:#f1e05a;--orange:#e34c26;--purple:#563d7c;--radius:10px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit}button{border:1px solid var(--line);background:#21262d;color:var(--text);border-radius:8px;padding:8px 12px;cursor:pointer}button:hover{border-color:var(--blue)}button.primary{background:var(--green);border-color:var(--green)}button.danger{background:var(--red);border-color:var(--red)}button:disabled{opacity:.45;cursor:not-allowed}input,textarea,select{border:1px solid var(--line);background:#010409;color:var(--text);border-radius:8px;padding:10px}.login{position:fixed;inset:0;z-index:50;display:grid;place-items:start center;overflow:auto;padding:20px;background:linear-gradient(135deg,#010409,#0d1117)}.login.hidden{display:none}.login-card{width:min(460px,94vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;margin:18px auto}.login-card label{display:grid;gap:6px;margin:10px 0;color:var(--muted);font-size:13px}.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px;border-bottom:1px solid var(--line);background:#010409;position:sticky;top:0;z-index:10}.brand{font-weight:900}.pill{border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:12px}.layout{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 58px)}@media(max-width:900px){.layout{grid-template-columns:1fr}.preview-wrap{min-height:55vh}}.pane{border-right:1px solid var(--line);min-width:0}.tabs{display:flex;gap:6px;padding:10px;border-bottom:1px solid var(--line);background:#0d1117}.tab.active{background:var(--blue);border-color:var(--blue)}.tools{display:flex;gap:6px;flex-wrap:wrap;padding:10px;border-bottom:1px solid var(--line)}.status{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;color:var(--muted);font-size:12px;border-bottom:1px solid var(--line)}textarea.editor{width:100%;height:62vh;display:block;background:#010409;color:var(--text);border:0;resize:vertical;padding:14px;font-family:Consolas,Monaco,monospace;font-size:14px;line-height:1.55;tab-size:2;outline:none}body.wrap-on textarea.editor{white-space:pre-wrap;overflow-wrap:anywhere}iframe{width:100%;height:100%;border:0;background:white}.preview-wrap{display:grid;grid-template-rows:auto 1fr;min-width:0}.preview-head{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;padding:10px;border-bottom:1px solid var(--line);background:var(--panel)}.modal{position:fixed;inset:0;z-index:40;display:none;place-items:start center;overflow:auto;padding:20px;background:rgba(1,4,9,.72)}.modal.show{display:grid}.modal-card{width:min(1120px,94vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin:20px auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.card{border:1px solid var(--line);border-radius:12px;background:#0d1117;padding:12px}.card h3{margin:0 0 8px}.setting-row{display:grid;gap:6px;margin:8px 0}.setting-row.inline{grid-template-columns:1fr auto;align-items:center}.admin-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;border-bottom:1px solid var(--line);padding-bottom:8px}.admin-tab.active{background:var(--blue);border-color:var(--blue)}.admin-panel{display:none}.admin-panel.active{display:block}pre{white-space:pre-wrap;background:#010409;border:1px solid var(--line);border-radius:10px;padding:12px;max-height:420px;overflow:auto}.diff-add{color:#7ee787}.diff-remove{color:#ff7b72}.lang{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.bar{height:8px;width:150px;border-radius:99px;overflow:hidden;display:flex;border:1px solid var(--line)}.circle{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);font-size:9px;font-weight:900;background:conic-gradient(var(--c) var(--p),#30363d 0)}.ok{color:#7ee787}.warn{color:#f2cc60}.bad{color:#ff7b72}.mini{font-size:12px;color:var(--muted);line-height:1.5}.admin-secret{display:none!important}
  </style>
</head>
<body>
  <div class="login" id="login">
    <div class="login-card">
      <h1>DevSphere Login</h1>
      <p class="pill">初期: user / 1234</p>
      <label>ユーザー名<input id="loginUser" value="user"></label>
      <label>PIN<input id="loginPin" type="password" value="1234"></label>
      <button class="primary" id="loginBtn" type="button">ログイン</button>
      <button id="googleBtn" type="button">Googleで進行</button>
      <p id="loginMsg" class="mini"></p>
      <details><summary>新規登録</summary><label>ユーザー名<input id="signupUser"></label><label>PIN<input id="signupPin" type="password"></label><button id="signupBtn" type="button">登録する</button></details>
    </div>
  </div>

  <header class="top">
    <span class="brand" id="brandTitle">DevSphere</span>
    <span class="pill" id="loginInfo">未ログイン</span>
    <span class="pill" id="adminInfo">Locked</span>
    <span class="pill">管理者: A+G</span>
    <button id="saveBtn">保存</button>
    <button id="historyBtn">履歴</button>
    <button id="backupBtn">バックアップ</button>
    <button id="logoutBtn">ログアウト</button>
  </header>

  <main class="layout">
    <section class="pane">
      <div class="tabs"><button class="tab active" data-file="html">HTML</button><button class="tab" data-file="css">CSS</button><button class="tab" data-file="js">JS</button></div>
      <div class="tools"><button class="primary" id="runBtn">実行</button><button id="formatBtn">整える</button><button id="copyBtn">コピー</button><button id="clearBtn">クリア</button><button id="templateBtn">テンプレ</button></div>
      <div class="status"><span id="fileLabel">HTML</span><span id="countLabel">0行 / 0文字</span><div class="lang" id="langStats"></div></div>
      <textarea class="editor" id="htmlCode"></textarea>
      <textarea class="editor" id="cssCode" hidden></textarea>
      <textarea class="editor" id="jsCode" hidden></textarea>
    </section>
    <section class="preview-wrap"><div class="preview-head"><strong>Preview</strong><span class="pill" id="saveName">保存名: DevSphere</span></div><iframe id="preview" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe></section>
  </main>

  <div class="modal" id="historyModal"><div class="modal-card"><h2>更新履歴 / 差分</h2><div class="grid"><div class="card"><div id="historyList"></div></div><div class="card"><pre id="diffView">履歴を選択してください。</pre></div></div><p style="text-align:right"><button id="closeHistory">閉じる</button></p></div></div>
  <div class="modal" id="backupModal"><div class="modal-card"><h2>バックアップ</h2><button class="primary" id="exportBtn">JSONを書き出し</button> <button id="importBtn">JSONから復元</button><textarea class="editor" id="backupText" style="height:260px"></textarea><p style="text-align:right"><button id="closeBackup">閉じる</button></p></div></div>
  <div class="modal" id="adminModal"><div class="modal-card"><h2>管理者モード</h2><div id="adminLockArea"><label>PIN<input id="adminPin" type="password" value="1234"></label><button class="primary" id="adminUnlock">解除</button><p id="adminMsg" class="mini"></p></div><div id="adminPanel" hidden><div class="admin-tabs"><button class="admin-tab active" data-admin="dashboard">状態</button><button class="admin-tab" data-admin="app">アプリ設定</button><button class="admin-tab" data-admin="login">ログイン</button><button class="admin-tab" data-admin="code">コード操作</button><button class="admin-tab" data-admin="storage">保存/バックアップ</button><button class="admin-tab" data-admin="security">セキュリティ</button></div><section class="admin-panel active" id="admin-dashboard"><div class="grid"><div class="card"><h3>診断</h3><pre id="diagnostics">診断待ち</pre><button id="refreshDiag">再診断</button></div><div class="card"><h3>管理者アップデート履歴</h3><div id="adminLog" class="mini"></div></div></div></section><section class="admin-panel" id="admin-app"><div class="grid"><div class="card"><h3>見た目</h3><div class="setting-row"><label>本体タイトル</label><input id="coreTitle" value="DevSphere"></div><div class="setting-row"><label>背景色</label><input id="coreBg" type="color" value="#0d1117"></div><div class="setting-row"><label>アクセント色</label><input id="coreAccent" type="color" value="#2f81f7"></div><div class="setting-row"><label>保存名</label><input id="coreSaveName" value="DevSphere"></div><label><input type="checkbox" id="wrapToggle"> エディタ折り返し</label><br><label><input type="checkbox" id="autoRunToggle"> 自動実行</label><br><button class="primary" id="applyCore">反映</button></div><div class="card"><h3>Preview権限</h3><label><input type="checkbox" id="sandboxPopups" checked> allow-popups</label><br><label><input type="checkbox" id="sandboxForms" checked> allow-forms</label><br><label><input type="checkbox" id="sandboxModals" checked> allow-modals</label><br><button id="applySandbox">権限を反映</button></div></div></section><section class="admin-panel" id="admin-login"><div class="grid"><div class="card"><h3>ユーザー管理</h3><div class="setting-row"><label>ユーザー名</label><input id="loginSetUser"></div><div class="setting-row"><label>PIN</label><input id="loginSetPin" type="password"></div><label><input type="checkbox" id="guestResetToggle" checked> userはゲスト扱い</label><br><button class="primary" id="saveLoginSet">保存</button></div><div class="card"><h3>簡易Google</h3><div class="setting-row"><label>Google名</label><input id="googleName" value="Google User"></div><div class="setting-row"><label>Googleメール</label><input id="googleMail" value="google-user@example.com"></div><button id="saveGoogleSet">Google設定保存</button></div></div></section><section class="admin-panel" id="admin-code"><div class="grid"><div class="card"><h3>テンプレート追加</h3><select id="templateSelect"><option value="card">カードUI</option><option value="counter">カウンター</option><option value="game">ミニゲーム</option></select><button class="primary" id="insertTemplate">挿入</button><p class="mini">現在のHTML/CSS/JSへ追記します。</p></div><div class="card"><h3>書き出し</h3><button id="downloadHtml">現在のHTMLをダウンロード</button><button id="downloadProject">プロジェクトJSONをダウンロード</button><button class="danger" id="resetCode">コード初期化</button></div></div></section><section class="admin-panel" id="admin-storage"><div class="grid"><div class="card"><h3>保存管理</h3><button id="forceSave">強制保存</button><button id="clearHistoryAdmin">履歴削除</button><button class="danger" id="clearStorage">DevSphere保存データ削除</button></div><div class="card"><h3>バックアップ復元</h3><textarea id="adminBackupBox" style="width:100%;height:160px"></textarea><button id="adminExport">ここへ書き出し</button><button id="adminImport">ここから復元</button></div></div></section><section class="admin-panel" id="admin-security"><div class="grid"><div class="card"><h3>管理者PIN変更</h3><div class="setting-row"><label>現在PIN</label><input id="oldAdminPin" type="password"></div><div class="setting-row"><label>新PIN</label><input id="newAdminPin" type="password"></div><button class="primary" id="changeAdminPin">変更</button></div><div class="card"><h3>危険操作</h3><button id="lockAdminBtn">管理者終了</button><button class="danger" id="factoryReset">完全初期化</button></div></div></section></div><p style="text-align:right"><button id="closeAdmin">閉じる</button></p></div></div>

<script>
const $=id=>document.getElementById(id);const STORAGE='devsphere.github.ready.v2';const ADMIN_PIN_KEY='devsphere.admin.pin.v2';let active='html';let admin=false;let autoRun=false;let history=[];let last=null;let adminLog=[];let state={html:'<!doctype html>\n<html lang="ja">\n<head>\n  <meta charset="utf-8">\n  <title>My App</title>\n</head>\n<body>\n  <h1>Hello DevSphere</h1>\n</body>\n</html>',css:'body {\n  font-family: system-ui, sans-serif;\n  padding: 24px;\n}',js:'console.log("Hello DevSphere");',login:{user:'user',pin:'1234'},provider:'guest',settings:{title:'DevSphere',bg:'#0d1117',accent:'#2f81f7',saveName:'DevSphere',wrap:false,guestReset:true,googleName:'Google User',googleMail:'google-user@example.com'}};
function load(){try{const s=JSON.parse(localStorage.getItem(STORAGE)||'null');if(s){state={...state,...s.state,settings:{...state.settings,...(s.state&&s.state.settings||{})}};history=s.history||[];last=s.last||null;adminLog=s.adminLog||[]}}catch(e){}$('htmlCode').value=state.html;$('cssCode').value=state.css;$('jsCode').value=state.js;applySettings();update();run();}
function persist(){state.html=$('htmlCode').value;state.css=$('cssCode').value;state.js=$('jsCode').value;localStorage.setItem(STORAGE,JSON.stringify({state,history,last,adminLog}));}
function logAdmin(msg){adminLog.unshift(new Date().toLocaleString()+' / '+msg);adminLog=adminLog.slice(0,60);persist();renderAdminLog()}
function snap(){return{html:$('htmlCode').value,css:$('cssCode').value,js:$('jsCode').value,time:new Date().toLocaleString()}}
function addHist(action){const after=snap();const before=last;if(before&&before.html===after.html&&before.css===after.css&&before.js===after.js)return false;history.unshift({id:Date.now(),action,time:after.time,before,after});history=history.slice(0,80);last=after;persist();return true}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function diff(a,b){a=String(a||'').split('\n');b=String(b||'').split('\n');let out='';for(let i=0;i<Math.max(a.length,b.length);i++){if(a[i]===b[i])out+='  '+esc(a[i]||'')+'\n';else{if(a[i]!=null)out+='<span class="diff-remove">- '+esc(a[i])+'</span>\n';if(b[i]!=null)out+='<span class="diff-add">+ '+esc(b[i])+'</span>\n';}}return out}
function showDiff(h){$('diffView').innerHTML='<b>'+esc(h.action)+' / '+esc(h.time)+'</b>\n\n--- HTML\n'+diff(h.before&&h.before.html,h.after.html)+'\n--- CSS\n'+diff(h.before&&h.before.css,h.after.css)+'\n--- JS\n'+diff(h.before&&h.before.js,h.after.js)}
function renderHist(){$('historyList').innerHTML=history.length?history.map((h,i)=>'<button style="display:block;width:100%;margin:4px 0" data-h="'+i+'">'+esc(h.time)+'<br>'+esc(h.action)+'</button>').join(''):'履歴なし';document.querySelectorAll('[data-h]').forEach(b=>b.onclick=()=>showDiff(history[+b.dataset.h]));}
function run(){const html=$('htmlCode').value,css=$('cssCode').value,js=$('jsCode').value;$('preview').srcdoc=html+'<style>'+css+'</style><script>'+js+'<\/script>';}
function switchFile(f){active=f;['html','css','js'].forEach(k=>$(k+'Code').hidden=k!==f);document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.file===f));$('fileLabel').textContent=f.toUpperCase();update();}
function update(){const v=$(active+'Code').value;$('countLabel').textContent=v.split('\n').length+'行 / '+Array.from(v).length+'文字';renderLang();}
function renderLang(){const len={html:$('htmlCode').value.length,css:$('cssCode').value.length,js:$('jsCode').value.length};const total=len.html+len.css+len.js||1;const items=[['HTML',len.html,'var(--orange)'],['CSS',len.css,'var(--purple)'],['JS',len.js,'var(--yellow)']];$('langStats').innerHTML='<div class="bar">'+items.map(x=>'<span style="width:'+(x[1]/total*100)+'%;background:'+x[2]+'"></span>').join('')+'</div>'+items.map(x=>'<span class="circle" style="--c:'+x[2]+';--p:'+(x[1]/total*100)+'%">'+Math.round(x[1]/total*100)+'%</span>').join('')}
function applySettings(){document.title=state.settings.title;$('brandTitle').textContent=state.settings.title;$('saveName').textContent='保存名: '+state.settings.saveName;document.body.style.background=state.settings.bg;document.documentElement.style.setProperty('--blue',state.settings.accent);document.body.classList.toggle('wrap-on',!!state.settings.wrap);$('coreTitle').value=state.settings.title;$('coreBg').value=state.settings.bg;$('coreAccent').value=state.settings.accent;$('coreSaveName').value=state.settings.saveName;$('wrapToggle').checked=!!state.settings.wrap;$('guestResetToggle').checked=!!state.settings.guestReset;$('googleName').value=state.settings.googleName;$('googleMail').value=state.settings.googleMail;$('loginSetUser').value=state.login.user;$('loginSetPin').value=state.login.pin;}
function login(provider='normal'){const u=$('loginUser').value.trim(),p=$('loginPin').value.trim();if(u!==state.login.user||p!==state.login.pin){$('loginMsg').textContent='ログインできません';return}state.provider=provider;if(provider==='guest'&&state.settings.guestReset){history=[];last=null}sessionStorage.setItem('devsphere.login','1');$('login').classList.add('hidden');$('loginInfo').textContent='ログイン中：'+(provider==='google'?'簡易Google':provider==='guest'?'ゲスト':'通常ログイン')+' / '+u;persist();}
function google(){state.login={user:state.settings.googleMail,pin:'google'};$('loginUser').value=state.login.user;$('loginPin').value=state.login.pin;login('google')}
function logout(){sessionStorage.removeItem('devsphere.login');$('login').classList.remove('hidden')}
function getAdminPin(){return localStorage.getItem(ADMIN_PIN_KEY)||'1234'}
function openAdmin(){if(!sessionStorage.getItem('devsphere.login'))return;$('adminModal').classList.add('show')}
function unlockAdmin(){if($('adminPin').value!==getAdminPin()){$('adminMsg').textContent='PINが違います';return}admin=true;$('adminInfo').textContent='Admin';$('adminPanel').hidden=false;$('adminLockArea').hidden=true;refreshDiag();renderAdminLog();logAdmin('管理者モード解除')}
function renderAdminLog(){$('adminLog').innerHTML=adminLog.length?adminLog.map(x=>'<div>'+esc(x)+'</div>').join(''):'履歴なし'}
function refreshDiag(){const size=new Blob([localStorage.getItem(STORAGE)||'']).size;const report=['保存サイズ: '+size+' bytes','履歴: '+history.length+'件','HTML: '+$('htmlCode').value.length+'文字','CSS: '+$('cssCode').value.length+'文字','JS: '+$('jsCode').value.length+'文字','ログイン: '+state.login.user,'管理者: '+(admin?'ON':'OFF')];$('diagnostics').textContent=report.join('\n')}
function exportObj(){return{state,history,last,adminLog,exportedAt:new Date().toISOString()}}
function download(name,text,type='text/plain'){const b=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function insertTemplate(kind){const t={card:{html:'\n<section class="card-demo"><h2>カードタイトル</h2><p>ここに説明文。</p></section>',css:'\n.card-demo{padding:20px;border-radius:16px;background:#fff3;box-shadow:0 8px 28px #0002}',js:''},counter:{html:'\n<button id="countBtn">0</button>',css:'\n#countBtn{font-size:32px;padding:20px 28px;border-radius:16px}',js:'\nlet c=0;document.getElementById("countBtn").onclick=()=>{c++;document.getElementById("countBtn").textContent=c}'},game:{html:'\n<div id="gameBox">クリックしてポイント</div>',css:'\n#gameBox{height:180px;display:grid;place-items:center;background:linear-gradient(135deg,#79c0ff,#7ee787);border-radius:18px;color:#062;font-weight:900}',js:'\nlet p=0;document.getElementById("gameBox").onclick=()=>{p+=10;document.getElementById("gameBox").textContent="POINT "+p}'}}[kind];$('htmlCode').value+=t.html;$('cssCode').value+=t.css;$('jsCode').value+=t.js;update();run();persist();addHist('template '+kind)}
window.addEventListener('keydown',e=>{window._keys=window._keys||{};window._keys[e.key.toLowerCase()]=1;if(window._keys.a&&window._keys.g){e.preventDefault();openAdmin()}});window.addEventListener('keyup',e=>{window._keys=window._keys||{};delete window._keys[e.key.toLowerCase()]});
$('loginBtn').onclick=()=>login($('loginUser').value==='user'?'guest':'normal');$('googleBtn').onclick=google;$('signupBtn').onclick=()=>{state.login={user:$('signupUser').value||'user',pin:$('signupPin').value||'1234'};persist();$('loginUser').value=state.login.user;$('loginPin').value=state.login.pin;login('normal')};$('logoutBtn').onclick=logout;$('runBtn').onclick=run;$('saveBtn').onclick=()=>{persist();alert(addHist('save')?'保存しました':'変更なし')};$('historyBtn').onclick=()=>{renderHist();$('historyModal').classList.add('show')};$('closeHistory').onclick=()=>$('historyModal').classList.remove('show');$('backupBtn').onclick=()=>{$('backupText').value=JSON.stringify(exportObj(),null,2);$('backupModal').classList.add('show')};$('closeBackup').onclick=()=>$('backupModal').classList.remove('show');$('exportBtn').onclick=()=>download('devsphere-backup.json',$('backupText').value,'application/json');$('importBtn').onclick=()=>{const d=JSON.parse($('backupText').value);state=d.state||state;history=d.history||[];last=d.last||null;adminLog=d.adminLog||[];persist();load();alert('復元しました')};$('adminUnlock').onclick=unlockAdmin;$('closeAdmin').onclick=()=>$('adminModal').classList.remove('show');document.querySelectorAll('.admin-tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.admin-tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.admin-panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('admin-'+b.dataset.admin).classList.add('active')});$('refreshDiag').onclick=refreshDiag;$('applyCore').onclick=()=>{state.settings.title=$('coreTitle').value;state.settings.bg=$('coreBg').value;state.settings.accent=$('coreAccent').value;state.settings.saveName=$('coreSaveName').value;state.settings.wrap=$('wrapToggle').checked;autoRun=$('autoRunToggle').checked;applySettings();persist();logAdmin('アプリ設定変更')};$('applySandbox').onclick=()=>{let s='allow-scripts';if($('sandboxPopups').checked)s+=' allow-popups';if($('sandboxForms').checke
